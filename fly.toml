# fly.toml app configuration file generated for claude-royale on 2026-07-15T23:53:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claude-royale'
primary_region = 'gru'

[build]
  dockerfile = 'server/Dockerfile'

[[mounts]]
  source = 'claude_royale_data'
  destination = '/app/server/data'

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  # Reinicia a maquina automaticamente se o servidor travar
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/leaderboard'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
