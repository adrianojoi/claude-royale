# Sobe o jogo completo: cliente em http://localhost:8080, servidor em ws://localhost:2567
#   docker compose up --build
# Para produção, defina VITE_SERVER_URL (ex.: wss://ws.clauderoyale.com) antes do build.
services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '2567:2567'
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-ws://localhost:2567}
    ports:
      - '8080:80'
    depends_on:
      - server
    restart: unless-stopped
